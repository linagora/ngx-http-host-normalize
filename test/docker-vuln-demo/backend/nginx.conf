worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type text/html;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent host="$host" http_host="$http_host"';

    access_log /var/log/nginx/access.log main;

    # Public virtual host - accessible through proxy
    server {
        listen 80;
        server_name public.local;
        root /var/www/public;

        location / {
            add_header X-Served-By "public.local";
            add_header X-HTTP-Host $http_host;
            try_files $uri $uri/ =404;
        }
    }

    # Protected virtual host - should NOT be accessible through proxy
    server {
        listen 80;
        server_name protected.local;
        root /var/www/protected;

        location / {
            add_header X-Served-By "protected.local";
            add_header X-HTTP-Host $http_host;
            try_files $uri $uri/ =404;
        }
    }

    # Catch-all
    server {
        listen 80 default_server;
        server_name _;
        return 404 "Unknown host\n";
    }
}
