worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host="$host" http_host="$http_host"';

    access_log /var/log/nginx/access.log main;

    # Only public.local is exposed through the proxy
    # protected.local should NOT be accessible
    server {
        listen 80;
        server_name public.local;

        location / {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }
    }

    # Catch-all for undefined hosts - should block protected.local
    server {
        listen 80 default_server;
        server_name _;
        return 403 "Access denied: unknown host\n";
    }
}
