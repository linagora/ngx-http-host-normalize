name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-deb:
    name: Build .deb (${{ matrix.codename }} ${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ${{ matrix.container }}
      options: --platform=${{ matrix.platform }}

    strategy:
      matrix:
        codename: [bookworm, trixie, sid]
        arch: [amd64, arm64, armhf, s390x]
        include:
          - codename: bookworm
            container: debian:bookworm
          - codename: trixie
            container: debian:trixie
          - codename: sid
            container: debian:sid
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armhf
            platform: linux/arm/v7
          - arch: s390x
            platform: linux/s390x

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version from tag: $VERSION"

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            debhelper \
            nginx-dev \
            devscripts \
            fakeroot

      - name: Update changelog version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update the version in debian/changelog
          sed -i "1s/([^)]*)/($VERSION)/" debian/changelog
          echo "Updated debian/changelog:"
          head -1 debian/changelog

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Move packages
        run: |
          mkdir -p packages
          mv ../*.deb packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}-${{ matrix.arch }}
          path: packages/*.deb
          retention-days: 7

  build-rpm:
    name: Build .rpm (${{ matrix.codename }} ${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ${{ matrix.container }}
      options: --platform=${{ matrix.platform }}

    strategy:
      matrix:
        codename: [el8, el9, el10]
        arch: [x86_64, aarch64, s390x]
        include:
          - codename: el8
            container: rockylinux:8
          - codename: el9
            container: rockylinux:9
          - codename: el10
            container: quay.io/rockylinux/rockylinux:10
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: s390x
            platform: linux/s390x

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version from tag: $VERSION"

      - name: Install build dependencies
        run: |
          # Enable EPEL for nginx
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled epel || true
          # On EL8, enable powertools; on EL9+, enable crb
          dnf config-manager --set-enabled powertools 2>/dev/null || \
            dnf config-manager --set-enabled crb 2>/dev/null || true
          # pcre-devel doesn't exist on EL10, only pcre2-devel
          # Use --allowerasing to handle curl-minimal vs curl conflict
          dnf install -y --allowerasing \
            rpm-build \
            gcc \
            make \
            pcre2-devel \
            zlib-devel \
            openssl-devel \
            curl \
            nginx
          # Install pcre-devel only if available (EL8/EL9)
          dnf install -y pcre-devel 2>/dev/null || true

      - name: Get nginx version
        id: nginx
        run: |
          NGINX_VERSION=$(nginx -v 2>&1 | sed 's/.*nginx\///')
          echo "version=$NGINX_VERSION" >> $GITHUB_OUTPUT
          echo "Nginx version: $NGINX_VERSION"

      - name: Build nginx module
        run: |
          NGINX_VERSION="${{ steps.nginx.outputs.version }}"

          # Download nginx source
          curl -sL "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz" -o nginx.tar.gz
          tar xzf nginx.tar.gz
          cd nginx-${NGINX_VERSION}

          # Configure with compat mode
          ./configure --with-compat --add-dynamic-module=..

          # Build module only
          make modules

          # Verify module was built
          ls -la objs/*.so

      - name: Create RPM structure
        run: |
          NGINX_VERSION="${{ steps.nginx.outputs.version }}"
          VERSION=$(grep '^Version:' rpm/nginx-mod-http-host-normalize.spec | awk '{print $2}')

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Copy built module
          cp nginx-${NGINX_VERSION}/objs/ngx_http_host_normalize_module.so ~/rpmbuild/SOURCES/

          # Copy spec file
          cp rpm/nginx-mod-http-host-normalize.spec ~/rpmbuild/SPECS/

          # Copy LICENSE and README
          cp LICENSE ~/rpmbuild/SOURCES/ 2>/dev/null || echo "AGPL-3.0" > ~/rpmbuild/SOURCES/LICENSE
          cp README.md ~/rpmbuild/SOURCES/ 2>/dev/null || echo "# ngx-http-host-normalize" > ~/rpmbuild/SOURCES/README.md

      - name: Build RPM package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date '+%a %b %d %Y')

          # Use simplified spec for pre-built module
          cat > ~/rpmbuild/SPECS/nginx-mod-http-host-normalize.spec << 'SPECEOF'
          Name:           nginx-mod-http-host-normalize
          Version:        __VERSION__
          Release:        1%{?dist}
          Summary:        Nginx module to normalize Host header for absolute URI requests

          License:        AGPL-3.0-or-later
          URL:            https://github.com/linagora/ngx-http-host-normalize

          Requires:       nginx >= 1.20

          %description
          An Nginx module that normalizes the Host header when an absolute URI is used
          in the HTTP request line, as specified in RFC 9112 Section 3.2.2.

          %install
          mkdir -p %{buildroot}%{_libdir}/nginx/modules
          mkdir -p %{buildroot}%{_datadir}/nginx/modules

          install -m 755 %{_sourcedir}/ngx_http_host_normalize_module.so \
              %{buildroot}%{_libdir}/nginx/modules/

          cat > %{buildroot}%{_datadir}/nginx/modules/mod-http-host-normalize.conf << 'EOF'
          load_module modules/ngx_http_host_normalize_module.so;
          EOF

          %files
          %{_libdir}/nginx/modules/ngx_http_host_normalize_module.so
          %{_datadir}/nginx/modules/mod-http-host-normalize.conf

          %changelog
          * __DATE__ LINAGORA <info@linagora.com> - __VERSION__-1
          - Release __VERSION__
          SPECEOF

          # Replace placeholders with actual values
          sed -i "s/__VERSION__/${VERSION}/g" ~/rpmbuild/SPECS/nginx-mod-http-host-normalize.spec
          sed -i "s/__DATE__/${DATE}/g" ~/rpmbuild/SPECS/nginx-mod-http-host-normalize.spec

          rpmbuild -bb ~/rpmbuild/SPECS/nginx-mod-http-host-normalize.spec

      - name: Move packages
        run: |
          mkdir -p packages
          find ~/rpmbuild/RPMS -name "*.rpm" -exec mv {} packages/ \;
          ls -la packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.codename }}-${{ matrix.arch }}
          path: packages/*.rpm
          retention-days: 7

  create-repo:
    name: Create Repositories
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c rpm

      - name: Create APT repository structure
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p repo

          # Export public key
          gpg --armor --export "$GPG_KEY_ID" > repo/KEY.gpg

          # Create repository for each distribution and architecture
          for codename in bookworm trixie sid; do
            echo "Processing $codename..."

            # Create directory structure for all architectures
            for arch in amd64 arm64 armhf s390x; do
              mkdir -p "repo/dists/${codename}/main/binary-${arch}"

              # Copy .deb files
              if [ -d "artifacts/deb-${codename}-${arch}" ]; then
                cp artifacts/deb-${codename}-${arch}/*.deb "repo/dists/${codename}/main/binary-${arch}/" || true
              fi

              # Generate Packages file
              cd repo
              dpkg-scanpackages --arch "$arch" "dists/${codename}/main/binary-${arch}" > "dists/${codename}/main/binary-${arch}/Packages" || true
              gzip -k "dists/${codename}/main/binary-${arch}/Packages"
              cd ..
            done

            # Create Release file with all architectures
            cd "repo/dists/${codename}"

            # Start building Release file content
            cat > Release << 'EOF'
          Origin: ngx-http-host-normalize
          Label: ngx-http-host-normalize
          Suite: stable
          Codename: ${codename}
          Architectures: amd64 arm64 armhf s390x
          Components: main
          Description: Nginx Host Normalize Module APT Repository
          Date: $(date -Ru)
          MD5Sum:
          EOF

            # Replace variables in header
            sed -i "s/\${codename}/${codename}/g" Release
            sed -i "s/\$(date -Ru)/$(date -Ru)/g" Release

            # Add checksums for all architectures
            for arch in amd64 arm64 armhf s390x; do
              PACKAGES_FILE="main/binary-${arch}/Packages"
              PACKAGES_GZ_FILE="main/binary-${arch}/Packages.gz"

              if [ -f "$PACKAGES_FILE" ]; then
                MD5_PACKAGES=$(md5sum "$PACKAGES_FILE" | cut -d' ' -f1)
                SIZE_PACKAGES=$(stat -c%s "$PACKAGES_FILE")
                echo " ${MD5_PACKAGES} ${SIZE_PACKAGES} ${PACKAGES_FILE}" >> Release
              fi

              if [ -f "$PACKAGES_GZ_FILE" ]; then
                MD5_PACKAGES_GZ=$(md5sum "$PACKAGES_GZ_FILE" | cut -d' ' -f1)
                SIZE_PACKAGES_GZ=$(stat -c%s "$PACKAGES_GZ_FILE")
                echo " ${MD5_PACKAGES_GZ} ${SIZE_PACKAGES_GZ} ${PACKAGES_GZ_FILE}" >> Release
              fi
            done

            # Add SHA256 section
            echo "SHA256:" >> Release
            for arch in amd64 arm64 armhf s390x; do
              PACKAGES_FILE="main/binary-${arch}/Packages"
              PACKAGES_GZ_FILE="main/binary-${arch}/Packages.gz"

              if [ -f "$PACKAGES_FILE" ]; then
                SHA256_PACKAGES=$(sha256sum "$PACKAGES_FILE" | cut -d' ' -f1)
                SIZE_PACKAGES=$(stat -c%s "$PACKAGES_FILE")
                echo " ${SHA256_PACKAGES} ${SIZE_PACKAGES} ${PACKAGES_FILE}" >> Release
              fi

              if [ -f "$PACKAGES_GZ_FILE" ]; then
                SHA256_PACKAGES_GZ=$(sha256sum "$PACKAGES_GZ_FILE" | cut -d' ' -f1)
                SIZE_PACKAGES_GZ=$(stat -c%s "$PACKAGES_GZ_FILE")
                echo " ${SHA256_PACKAGES_GZ} ${SIZE_PACKAGES_GZ} ${PACKAGES_GZ_FILE}" >> Release
              fi
            done

            # Sign Release file
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --clearsign -o InRelease Release
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              -abs -o Release.gpg Release

            cd ../../..
          done

      - name: Create YUM repository structure
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Create repository for each EL version and architecture
          for elver in el8 el9 el10; do
            for arch in x86_64 aarch64 s390x; do
              echo "Processing ${elver} ${arch}..."

              # Create directory structure
              mkdir -p "repo/rpm/${elver}/${arch}"

              # Copy .rpm files
              if [ -d "artifacts/rpm-${elver}-${arch}" ]; then
                cp artifacts/rpm-${elver}-${arch}/*.rpm "repo/rpm/${elver}/${arch}/" || true
              fi

              # Sign RPM packages if any exist
              echo "%_gpg_name $GPG_KEY_ID" > ~/.rpmmacros
              echo "%__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --pinentry-mode loopback --passphrase-fd 0 -u \"%{_gpg_name}\" -sbo %{__signature_filename} %{__plaintext_filename}" >> ~/.rpmmacros

              for rpm in repo/rpm/${elver}/${arch}/*.rpm; do
                if [ -f "$rpm" ]; then
                  echo "$GPG_PASSPHRASE" | rpm --addsign "$rpm"
                fi
              done

              # Create repository metadata
              createrepo_c "repo/rpm/${elver}/${arch}"

              # Sign repository metadata
              if [ -f "repo/rpm/${elver}/${arch}/repodata/repomd.xml" ]; then
                echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                  --detach-sign --armor "repo/rpm/${elver}/${arch}/repodata/repomd.xml"
              fi
            done
          done

      - name: Create index.html
        run: |
          cat > repo/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>ngx-http-host-normalize Repository</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
              pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
              h1 { color: #333; }
              h2 { color: #555; margin-top: 40px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
              h3 { color: #666; margin-top: 25px; }
            </style>
          </head>
          <body>
            <h1>ngx-http-host-normalize Repository</h1>
            <p>This repository provides packages for <a href="https://github.com/linagora/ngx-http-host-normalize">ngx-http-host-normalize</a>,
               an Nginx module that normalizes the Host header when an absolute URI is used in the request line (RFC 9112 Section 3.2.2).</p>

            <h2>Debian / Ubuntu (APT)</h2>
            <p>Supported distributions:</p>
            <ul>
              <li><strong>Debian 12</strong> (bookworm)</li>
              <li><strong>Debian 13</strong> (trixie)</li>
              <li><strong>Debian unstable</strong> (sid)</li>
            </ul>
            <p>Supported architectures: <strong>amd64, arm64, armhf, s390x</strong></p>

            <h3>1. Add the GPG key</h3>
            <pre>curl -fsSL https://linagora.github.io/ngx-http-host-normalize/KEY.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/ngx-http-host-normalize.gpg</pre>

            <h3>2. Add the repository</h3>
            <p>For <strong>Debian 12 (bookworm)</strong>:</p>
            <pre>echo "deb [signed-by=/etc/apt/keyrings/ngx-http-host-normalize.gpg] https://linagora.github.io/ngx-http-host-normalize bookworm main" | sudo tee /etc/apt/sources.list.d/ngx-http-host-normalize.list</pre>

            <p>For <strong>Debian 13 (trixie)</strong>:</p>
            <pre>echo "deb [signed-by=/etc/apt/keyrings/ngx-http-host-normalize.gpg] https://linagora.github.io/ngx-http-host-normalize trixie main" | sudo tee /etc/apt/sources.list.d/ngx-http-host-normalize.list</pre>

            <p>For <strong>Debian unstable (sid)</strong>:</p>
            <pre>echo "deb [signed-by=/etc/apt/keyrings/ngx-http-host-normalize.gpg] https://linagora.github.io/ngx-http-host-normalize sid main" | sudo tee /etc/apt/sources.list.d/ngx-http-host-normalize.list</pre>

            <h3>3. Install</h3>
            <pre>sudo apt update
          sudo apt install libnginx-mod-http-host-normalize</pre>

            <h3>4. Enable the module</h3>
            <p>The module is automatically enabled on install. If you need to enable it manually:</p>
            <pre>sudo ln -sf /usr/share/nginx/modules-available/mod-http-host-normalize.conf /etc/nginx/modules-enabled/50-mod-http-host-normalize.conf
          sudo nginx -t && sudo systemctl reload nginx</pre>

            <h2>Rocky Linux / RHEL / AlmaLinux (DNF)</h2>
            <p>Supported distributions:</p>
            <ul>
              <li><strong>Rocky Linux 8</strong> / RHEL 8 / AlmaLinux 8</li>
              <li><strong>Rocky Linux 9</strong> / RHEL 9 / AlmaLinux 9</li>
              <li><strong>Rocky Linux 10</strong> / RHEL 10 / AlmaLinux 10</li>
            </ul>
            <p>Supported architectures: <strong>x86_64, aarch64, s390x</strong></p>

            <h3>1. Import the GPG key</h3>
            <pre>sudo rpm --import https://linagora.github.io/ngx-http-host-normalize/KEY.gpg</pre>

            <h3>2. Add the repository</h3>
            <pre>sudo tee /etc/yum.repos.d/ngx-http-host-normalize.repo &lt;&lt; 'EOF'
          [ngx-http-host-normalize]
          name=Nginx Host Normalize Module
          baseurl=https://linagora.github.io/ngx-http-host-normalize/rpm/el$releasever/$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://linagora.github.io/ngx-http-host-normalize/KEY.gpg
          EOF</pre>

            <h3>3. Install</h3>
            <pre>sudo dnf install nginx-mod-http-host-normalize</pre>

            <h3>4. Enable the module</h3>
            <p>Add this line at the <strong>top</strong> of <code>/etc/nginx/nginx.conf</code> (before any blocks):</p>
            <pre>load_module /usr/lib64/nginx/modules/ngx_http_host_normalize_module.so;</pre>
            <p>Then reload nginx:</p>
            <pre>sudo nginx -t && sudo systemctl reload nginx</pre>

            <h2>Links</h2>
            <ul>
              <li><a href="https://github.com/linagora/ngx-http-host-normalize">GitHub Repository</a></li>
              <li><a href="KEY.gpg">GPG Public Key</a></li>
            </ul>

            <hr style="margin-top: 40px;">
            <p style="color: #888; font-size: 0.9em;">
              &copy; 2026 <a href="https://linagora.com">LINAGORA</a> - Licensed under AGPL-3.0
            </p>
          </body>
          </html>
          EOF

      - name: Generate directory indexes
        run: |
          cd repo
          find . -type d | while read dir; do
            [ "$dir" = "." ] && continue
            relpath="${dir#./}"

            cat > "$dir/index.html" << DIREOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Index of /${relpath}/</title>
            <style>
              body { font-family: monospace; margin: 20px; }
              h1 { border-bottom: 1px solid #ccc; padding-bottom: 10px; }
              table { border-collapse: collapse; }
              td, th { padding: 5px 15px; text-align: left; }
              a { text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Index of /${relpath}/</h1>
            <table>
              <tr><th>Name</th><th>Size</th></tr>
              <tr><td><a href="../">../</a></td><td>-</td></tr>
          DIREOF

            for item in "$dir"/*; do
              [ -e "$item" ] || continue
              name=$(basename "$item")
              [ "$name" = "index.html" ] && continue

              if [ -d "$item" ]; then
                echo "      <tr><td><a href=\"${name}/\">${name}/</a></td><td>-</td></tr>" >> "$dir/index.html"
              else
                size=$(stat -c%s "$item" 2>/dev/null || echo "0")
                if [ "$size" -gt 1048576 ]; then
                  hsize="$(echo "scale=1; $size/1048576" | bc)M"
                elif [ "$size" -gt 1024 ]; then
                  hsize="$(echo "scale=1; $size/1024" | bc)K"
                else
                  hsize="${size}B"
                fi
                echo "      <tr><td><a href=\"${name}\">${name}</a></td><td>${hsize}</td></tr>" >> "$dir/index.html"
              fi
            done

            cat >> "$dir/index.html" << DIREOF
            </table>
          </body>
          </html>
          DIREOF
          done
          cd ..

      - name: Upload repository
        uses: actions/upload-artifact@v4
        with:
          name: repo
          path: repo/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: create-repo
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download repository
        uses: actions/download-artifact@v4
        with:
          name: repo
          path: repo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
